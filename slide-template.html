<body class="slide-host">

<section class="stage bg-paper text-ink">
  <img src="assets/corner-mark.svg" class="corner" alt="">

  <!-- Eyebrow: short, uppercase, tracked. -->
  <div class="b left-[65.3px] top-[18.2px] eyebrow text-[18.7px] tr-179">SECTION LABEL</div>

  <!-- Headline: serif, one idea, ≤ 2 lines. -->
  <h2 class="b left-[65.3px] top-[58px] w-[980px] title text-[48px]">Your headline goes here,<br>kept to one clear idea.</h2>

  <!-- Supporting line. -->
  <p class="b left-[65.3px] top-[184px] w-[900px] text-body text-[18.7px] leading-[1.48]">One or two sentences of plain support. Specific beats vague. No staccato fragments, no rhetorical question-and-answer, no three-word endings — see DESIGN.md.</p>

       existing option rather than inventing new ones. -->

</section>
