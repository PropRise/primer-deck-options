<!-- Cloned from the discovery deck cover (context/1-cover.html). Sanitized for the public

<section class="stage bg-bgdark text-white">
  <img src="../assets/corner-mark.svg" class="corner" alt="">

  <!-- Primer wordmark, top-left (matches the cover) -->
  <div class="b left-[76.8px] top-[40px] font-serif font-bold text-white text-[40px] tr-107">Primer</div>

  <!-- One line to set the stage -->

  <span class="b left-[920.5px] top-[531.8px] w-[274.9px] h-px bg-white/30"></span>

  <div class="b left-[69px] top-[568.8px] w-[1126.4px] h-[98px] flex items-center justify-around" style="background: rgba(208,206,206,0.36)">
    <span class="font-serif font-bold text-white/90 text-[27px] tr-107">Acme Storage</span>
    <span class="font-serif font-bold text-white/90 text-[27px] tr-107">Cedar Park</span>
    <span class="font-serif font-bold text-white/90 text-[27px] tr-107">Northwind</span>
