<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Primer — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --pine:#193C33; --teal:#2C8B7B; --mist:#9FC6BD; --soft:#cfe0db; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:Inter,system-ui,sans-serif; background:var(--pine); color:#fff; overflow:hidden; }

  .bar{ position:fixed; top:0; left:0; right:0; height:52px; display:flex; align-items:center; gap:16px; padding:0 22px; z-index:10; }
  .brand{ font-weight:700; letter-spacing:.01em; font-size:16px; }
  .brand span{ color:var(--mist); font-weight:500; }
  .slidetitle{ color:var(--soft); font-size:13.5px; }
  .count{ margin-left:auto; color:var(--mist); font-size:13px; font-variant-numeric:tabular-nums; }

  .stage-wrap{ position:fixed; inset:52px 0 36px 0; display:flex; align-items:center; justify-content:center; }
  .frame{ width:1280px; height:720px; background:#fff; box-shadow:0 24px 70px rgba(0,0,0,.45); transform-origin:center center; }
  iframe{ width:1280px; height:720px; border:0; display:block; background:#fff; }

  .nav{ position:fixed; top:52px; bottom:36px; width:11%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:8; color:rgba(255,255,255,.45); user-select:none; transition:color .15s, background .15s; }
  .nav:hover{ color:#fff; background:rgba(255,255,255,.05); }
  .nav.left{ left:0; justify-content:flex-start; padding-left:18px; }
  .nav.right{ right:0; justify-content:flex-end; padding-right:18px; }
  .nav svg{ width:32px; height:32px; }

  .dots{ position:fixed; bottom:13px; left:0; right:0; display:flex; gap:7px; justify-content:center; z-index:10; }
  .dot{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.26); cursor:pointer; transition:background .15s, transform .15s; }
  .dot:hover{ background:rgba(255,255,255,.5); }
  .dot.active{ background:var(--teal); transform:scale(1.25); }

  .hint{ position:fixed; bottom:13px; right:18px; color:rgba(255,255,255,.32); font-size:11.5px; z-index:10; }
</style>
</head>
<body>
  <div class="bar">
    <div class="brand">Primer <span>· Demo</span></div>
    <div class="slidetitle" id="title"></div>
    <div class="count" id="count"></div>
  </div>

  <div class="nav left" id="prev" title="Previous (←)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
  <div class="nav right" id="next" title="Next (→)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>

  <div class="stage-wrap">
    <div class="frame" id="frame"><iframe id="slide" src="" title="slide"></iframe></div>
  </div>

  <div class="dots" id="dots"></div>
  <div class="hint">← → to navigate</div>

  <script>
    // The demo deck, in running order. Add a slide by adding a line here.
    const slides = [
      { file: 'intro.html',          title: 'Intro' },
      { file: 'flex.html',           title: 'Who relies on Primer' },
      { file: 'custom-pain.html',    title: 'What we heard' },
      { file: 'process-flow.html',   title: 'How Primer works' },
      { file: 'automations.html',    title: 'AI Automations' },
      { file: 'intelligence.html',   title: 'AI Intelligence' },
      { file: 'warehouse-loop.html', title: 'Your data warehouse' },
      { file: 'questions.html',      title: 'Next steps' },
    ];

    let i = 0;
    const slideEl = document.getElementById('slide');
    const titleEl = document.getElementById('title');
    const countEl = document.getElementById('count');
    const frame   = document.getElementById('frame');
    const dotsEl  = document.getElementById('dots');

    slides.forEach((s, idx) => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.title = s.title;
      d.onclick = () => go(idx);
      dotsEl.appendChild(d);
    });

    function fit(){
      const availW = window.innerWidth;
      const availH = window.innerHeight - 52 - 36;
      const scale = Math.min(availW / 1280, availH / 720) * 0.96;
      frame.style.transform = 'scale(' + scale + ')';
    }
    function render(){
      slideEl.src = slides[i].file;
      titleEl.textContent = slides[i].title;
      countEl.textContent = (i + 1) + ' / ' + slides.length;
      [...dotsEl.children].forEach((d, idx) => d.classList.toggle('active', idx === i));
      location.hash = String(i + 1);
    }
    function go(n){
      i = Math.max(0, Math.min(slides.length - 1, n));
      render();
    }

    document.getElementById('prev').onclick = () => go(i - 1);
    document.getElementById('next').onclick = () => go(i + 1);
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go(i + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(i - 1); }
    });
    window.addEventListener('resize', fit);

    const start = parseInt((location.hash || '').replace('#', ''), 10);
    if (!isNaN(start) && start >= 1 && start <= slides.length) i = start - 1;
    fit();
    render();
  </script>
</body>
</html>
